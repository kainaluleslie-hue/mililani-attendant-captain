<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mililani Attendant Captain</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f1115;
color:white;
}

header{
text-align:center;
padding:20px;
background:#151922;
}

h1{
margin:0;
font-size:28px;
}

.sub{
color:#9aa3b2;
margin-top:5px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:15px 0;
}

.tab{
background:#232938;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#2d7ff9;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.post-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.post-btn{
background:#232938;
padding:14px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.card{
background:#181c26;
padding:18px;
border-radius:12px;
margin-top:20px;
}

.shift{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #2c3245;
}

.notes{
margin-top:12px;
background:#232938;
padding:10px;
border-radius:8px;
}

.map{
margin-top:15px;
}

.map img{
width:100%;
border-radius:10px;
}

.back{
margin-top:15px;
background:#2d7ff9;
padding:10px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Mililani Attendant Captain</h1>
<div class="sub">239 Palii Street, Mililani HI 96789</div>
</header>

<div class="container">

<div id="postGrid" class="post-grid"></div>

<div id="postCard" style="display:none"></div>

</div>

<script>

const posts = {

1:{
title:"Post 1 – Lobby Entrance",
map:"BKM%20MAP%20%231.jpg",
shifts:[
["Team A","Grant Manalili"],
["Team A","Charlie Omo"],
["Team B","Joel Kiliona"],
["Team B","Esaias Parrish"]
]
},

2:{
title:"Post 2 – Front Center",
map:"BKM%20MAP%20%232.jpg",
shifts:[
["Team A","Mark Foster"],
["Team B","Erwin Pascua"]
]
},

3:{
title:"Post 3 – Left Auditorium",
map:"BKM%20MAP%20%232.jpg",
shifts:[
["Team A","Kawika Delacruz"],
["Team B","Norman Ho'omanawanui"]
]
},

4:{
title:"Post 4 – Right Auditorium",
map:"BKM%20MAP%20%232.jpg",
shifts:[
["Team A","Hiland Itelmong"],
["Team B","Jourdan Manta"]
]
},

5:{
title:"Post 5 – KH A Area",
map:"BKM%20MAP%20%233.jpg",
shifts:[
["Team A","Rodney Bristol"],
["Team B","Logan Griffin"]
]
},

6:{
title:"Post 6 – Basement Stairs",
map:"BKM%20MAP%20%234.jpg",
shifts:[
["Team A","Kepa Apolo"],
["Team A","Zechariah Tubon"],
["Team B","Al Tiu"],
["Team B","(Need one more brother)"]
]
},

7:{
title:"Post 7 – Top of Stairs",
map:"BKM%20MAP%20%234.jpg",
shifts:[
["Team A","David Yamashita"],
["Team B","Sean Yarbent"]
]
},

8:{
title:"Post 8 – Elevator Area (Balcony)",
map:"BKM%20MAP%20%235.jpg",
shifts:[
["Team A","Jordan Moananu"],
["Team B","Dennis Maeda"]
]
},

9:{
title:"Post 9 – Balcony Area",
map:"BKM%20MAP%20%235.jpg",
shifts:[
["Team A","Nainoa Driver"],
["Team B","Joey Cariaga"]
]
}

};

const grid = document.getElementById("postGrid");
const card = document.getElementById("postCard");

for(let i=1;i<=9;i++){

let btn=document.createElement("div");
btn.className="post-btn";
btn.innerText="Post "+i;

btn.onclick=()=>openPost(i);

grid.appendChild(btn);

}

function openPost(num){

const post=posts[num];

grid.style.display="none";
card.style.display="block";

let shiftHTML="";

post.shifts.forEach(s=>{
shiftHTML+=`
<div class="shift">
<div>${s[0]}</div>
<div>${s[1]}</div>
</div>
`;
});

card.innerHTML=`

<div class="card">

<h2>${post.title}</h2>

<div class="card">

${shiftHTML}

</div>

<div class="notes">

<strong>Captain Notes</strong><br>
Stay alert and assist overseer direction.

</div>

<div class="map">

<strong>Post Location Reference</strong>

<img src="${post.map}">

</div>

<div class="back" onclick="goBack()">Back to Posts</div>

</div>

`;

}

function goBack(){

card.style.display="none";
grid.style.display="grid";

}

</script>

</body>
</html>
