<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mililani Attendant App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 16px;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
    }

    .readonly input {
      background: #334155;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<h1>Mililani Attendant App</h1>

<div class="top-bar">
  <button id="loginBtn">Sign In</button>
  <button id="logoutBtn" style="display:none;">Logout</button>
</div>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDM3hsCFZ7_-PnJqCXgwG7ItawivcVfypc",
  authDomain: "mililani-attendant-app.firebaseapp.com",
  projectId: "mililani-attendant-app",
  storageBucket: "mililani-attendant-app.firebasestorage.app",
  messagingSenderId: "615437717899",
  appId: "1:615437717899:web:199b5d400803428fd79f8e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "kainaluleslie@gmail.com";

const appDiv = document.getElementById("app");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

// 🔐 LOGIN BUTTON
loginBtn.onclick = () => {
  signInWithRedirect(auth, provider);
};

// 🔐 HANDLE REDIRECT RETURN
getRedirectResult(auth).catch(err => console.log(err));

// 🔐 LOGOUT
logoutBtn.onclick = () => signOut(auth);

// 🔄 AUTH STATE
onAuthStateChanged(auth, (user) => {

  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
  } else {
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }

  loadData(user);
});

// 📡 REAL-TIME DATA
function loadData(user) {

  onSnapshot(collection(db, "posts"), (snapshot) => {

    appDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {

      const data = docSnap.data();

      const isAdmin = user && user.email === ADMIN_EMAIL;

      const card = document.createElement("div");
      card.className = "card";

      if (!isAdmin) card.classList.add("readonly");

      card.innerHTML = `
        <strong>${data.name}</strong>
        <input value="${data.value || ""}" ${isAdmin ? "" : "disabled"} />
      `;

      const input = card.querySelector("input");

      if (isAdmin) {
        input.onchange = async () => {
          await setDoc(doc(db, "posts", docSnap.id), {
            name: data.name,
            value: input.value
          });
        };
      }

      appDiv.appendChild(card);
    });
  });
}

</script>

</body>
</html>
