<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mililani Attendant Captain</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#181c26;
      --panel-2:#232938;
      --panel-3:#1d2433;
      --header:#151922;
      --line:#2c3245;
      --text:#ffffff;
      --muted:#9aa3b2;
      --blue:#2d7ff9;
      --blue-hover:#3b8cff;
      --button:#2a3145;
      --button-hover:#35405c;
      --input-bg:#f4f6fa;
      --input-text:#111111;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      text-align:center;
      padding:20px;
      background:var(--header);
    }

    h1{
      margin:0;
      font-size:28px;
    }

    .sub{
      color:var(--muted);
      margin-top:5px;
    }

    .container{
      max-width:960px;
      margin:0 auto;
      padding:20px;
    }

    .utility-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .utility-btn{
      background:var(--blue);
      padding:12px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:140px;
      box-shadow:0 4px 10px rgba(0,0,0,.35);
      transition:background .2s;
      user-select:none;
      text-align:center;
    }

    .utility-btn:hover{
      background:var(--blue-hover);
    }

    .utility-btn.secondary{
      background:var(--button);
    }

    .utility-btn.secondary:hover{
      background:var(--button-hover);
    }

    .mode-note{
      color:var(--muted);
      font-size:13px;
      align-self:center;
      padding-left:4px;
    }

    .top-bar{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back-top{
      background:var(--blue);
      padding:16px 26px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      font-size:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      box-shadow:0 4px 10px rgba(0,0,0,.35);
      transition:background .2s;
      user-select:none;
    }

    .back-top:hover{
      background:var(--blue-hover);
    }

    .alert-shell{
      background:var(--panel);
      border-radius:12px;
      margin-bottom:18px;
      overflow:hidden;
      border:1px solid var(--line);
      flex:1;
      min-width:260px;
    }

    .alert-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      cursor:pointer;
      background:#1b2030;
      font-weight:bold;
    }

    .alert-body{
      padding:14px 16px;
      border-top:1px solid var(--line);
      display:none;
    }

    .alert-body.open{
      display:block;
    }

    .alert-editor{
      width:100%;
      min-height:140px;
      border:none;
      border-radius:10px;
      padding:12px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      resize:vertical;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .alert-help{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .alert-actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .alert-btn{
      background:var(--panel-2);
      border-radius:8px;
      padding:12px 14px;
      cursor:pointer;
      font-weight:bold;
      user-select:none;
    }

    .alert-btn.primary{
      background:var(--blue);
    }

    .alert-btn:hover{
      filter:brightness(1.08);
    }

    .post-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .post-btn{
      background:var(--panel-2);
      padding:16px 14px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
      font-weight:bold;
      font-size:18px;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
      user-select:none;
    }

    .post-btn:hover{
      background:#2f384f;
    }

    .card{
      background:var(--panel);
      padding:18px;
      border-radius:12px;
      margin-top:20px;
    }

    .card h2{
      margin-top:0;
      margin-bottom:14px;
      font-size:24px;
    }

    .section-box{
      background:var(--panel-2);
      padding:14px;
      border-radius:10px;
      margin-top:14px;
    }

    .label{
      font-weight:bold;
      margin-bottom:8px;
      font-size:15px;
    }

    .details-box textarea,
    .notes textarea{
      width:100%;
      border:none;
      border-radius:8px;
      padding:10px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      resize:vertical;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .details-box textarea{
      min-height:70px;
    }

    .schedule-wrap{
      margin-top:8px;
      border-radius:10px;
      overflow:hidden;
      border:1px solid var(--line);
    }

    .schedule-head{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:12px;
      background:#1c2231;
      padding:12px 14px;
      font-weight:bold;
      border-bottom:1px solid var(--line);
    }

    .shift-row{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:12px;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      align-items:center;
    }

    .shift-row:last-child{
      border-bottom:none;
    }

    .shift-row:nth-child(odd){
      background:var(--panel-2);
    }

    .shift-row:nth-child(even){
      background:var(--panel-3);
    }

    .time-cell{
      font-weight:bold;
      color:#f1f3f7;
    }

    .assigned-input{
      width:100%;
      border:none;
      border-radius:8px;
      padding:10px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .map{
      margin-top:14px;
    }

    .map-wrap{
      width:100%;
      border-radius:10px;
      overflow:hidden;
      background:#ffffff;
      border:1px solid rgba(0,0,0,.08);
    }

    .map-wrap img{
      width:100%;
      display:block;
      border-radius:10px;
    }

    .notes{
      margin-top:14px;
      background:var(--panel-2);
      padding:12px;
      border-radius:10px;
      line-height:1.5;
    }

    .notes textarea{
      margin-top:10px;
      min-height:110px;
    }

    .count-box{
      margin-top:14px;
      background:var(--panel-2);
      padding:12px;
      border-radius:10px;
    }

    .count-box input{
      width:100%;
      margin-top:8px;
      margin-bottom:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
      font-size:14px;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .action-row{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .save{
      flex:1;
      padding:14px 12px;
      text-align:center;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      background:var(--button);
      user-select:none;
    }

    .save:hover{
      background:var(--button-hover);
    }

    .save.disabled{
      opacity:.7;
      cursor:default;
    }

    .loading-bar{
      margin-bottom:14px;
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width:700px){
      .post-grid{
        grid-template-columns:repeat(2,1fr);
      }

      .schedule-head,
      .shift-row{
        grid-template-columns:1fr;
      }

      .back-top{
        min-width:100%;
      }

      .utility-btn{
        min-width:unset;
        flex:1 1 calc(50% - 10px);
      }

      .mode-note{
        width:100%;
      }
    }

    @media print{
      body{
        background:#fff !important;
        color:#000 !important;
      }

      .utility-bar,
      .top-bar,
      #topBack,
      #loadingBar{
        display:none !important;
      }

      .container{
        max-width:100%;
        padding:0;
      }

      .card,
      .section-box,
      .notes,
      .count-box{
        background:#fff !important;
        color:#000 !important;
        border:1px solid #bbb !important;
      }

      .schedule-head{
        background:#eee !important;
        color:#000 !important;
      }

      .shift-row:nth-child(odd),
      .shift-row:nth-child(even){
        background:#fff !important;
        color:#000 !important;
      }

      .time-cell,
      .label,
      .card h2,
      strong{
        color:#000 !important;
      }

      textarea,
      input{
        background:#fff !important;
        color:#000 !important;
        border:1px solid #bbb !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mililani Attendant Captain</h1>

  <div class="container">
    <div class="loading-bar" id="loadingBar">Loading board…</div>

      <div class="utility-btn" id="authButton">Sign In</div>
      <div class="utility-btn secondary" onclick="shareBoard()">Share Link</div>
      <div class="utility-btn secondary" onclick="printBoard()">Print</div>
      <div class="mode-note" id="modeNote"></div>
    </div>

    <div class="top-bar">
      <div class="back-top" onclick="goBack()" id="topBack" style="display:none;">

      <div class="alert-shell">

        </div>
        <div class="alert-body" id="alertBody">
          <textarea id="alertEditor" class="alert-editor"></textarea>
          <div class="alert-help" id="alertHelp">One alert per line.</div>
          <div class="alert-actions" id="alertActions">
            <div class="alert-btn primary" onclick="saveAlerts()">Save Alerts</div>
            <div class="alert-btn" onclick="resetAlerts()">Reset Default Alerts</div>
          </div>
        </div>

const auth = getAuth(app);

    let alertsText = defaultAlerts.join("\n");
    let alertsOpen = false;

    function cloneDefaultPosts(){
      return JSON.parse(JSON.stringify(posts));
    }

    function getDefaultPayload(){
      return {
        alertsText: defaultAlerts.join("\n"),
        alertsOpen: false,
        posts: cloneDefaultPosts(),
        updatedAt: serverTimestamp()
      };
    }

    async function ensureBoardExists(){
      const snap = await getDoc(boardRef);
      if(!snap.exists()){
        await setDoc(boardRef, getDefaultPayload());
      }
    }

    function applyBoardData(data){
      alertsText = typeof data.alertsText === "string" ? data.alertsText : defaultAlerts.join("\n");
      alertsOpen = !!data.alertsOpen;

      if(data.posts){
        Object.keys(data.posts).forEach(function(key){
          if(posts[key]){
            const src = data.posts[key];
            posts[key].title = src.title ?? posts[key].title;
            posts[key].details = src.details ?? posts[key].details;
            posts[key].notes = src.notes ?? posts[key].notes;
            posts[key].schedule = Array.isArray(src.schedule) ? src.schedule : posts[key].schedule;
            if(posts[key].count1 !== undefined){
              posts[key].count1 = src.count1 ?? "";
              posts[key].count2 = src.count2 ?? "";
            }
          }
        });
      }
    }

    function buildBoardPayload(){
      const payloadPosts = {};

      Object.keys(posts).forEach(function(key){
        payloadPosts[key] = {
          title: posts[key].title || "",
          details: posts[key].details || "",
          notes: posts[key].notes || "",
          schedule: posts[key].schedule || [],
          count1: posts[key].count1 || "",
          count2: posts[key].count2 || ""
        };
      });

      return {
        alertsText,
        alertsOpen,
        posts: payloadPosts,
        updatedAt: serverTimestamp()
      };
    }

    async function saveBoard(){
      if(!isOwner) return;
      await setDoc(boardRef, buildBoardPayload(), { merge: true });
    }

    function escapeHtmlText(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeHtmlAttr(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderButtons(){
      const grid = document.getElementById("postGrid");
      grid.innerHTML = "";

      for(let i = 1; i <= 9; i++){
        const btn = document.createElement("div");
        btn.className = "post-btn";
        btn.textContent = "Post " + i;
        btn.onclick = function(){
          openPost(i);
        };
        grid.appendChild(btn);
      }
    }

    function renderAlerts(){
      const editor = document.getElementById("alertEditor");
      const body = document.getElementById("alertBody");
      const chev = document.getElementById("alertChevron");
      const help = document.getElementById("alertHelp");
      const actions = document.getElementById("alertActions");

      if(editor){
        editor.value = alertsText;
        editor.readOnly = !isOwner;
      }

      if(body){
        body.classList.toggle("open", alertsOpen);
      }

      if(chev){
        chev.textContent = alertsOpen ? "▴" : "▾";
      }

      if(help){
        help.textContent = isOwner
          ? "One alert per line. Edit anything you like, then save."
          : "View-only alerts.";
      }

      if(actions){
        actions.style.display = isOwner ? "flex" : "none";
      }
    }

    function updateOwnerUi(){
      const authButton = document.getElementById("authButton");
      const modeNote = document.getElementById("modeNote");

      if(authButton){
        authButton.textContent = isOwner ? "Sign Out" : "Sign In";
        authButton.onclick = async function(){
          try{
        if(isOwner){
          await signOut(auth);
        }else{
          await signInWithRedirect(auth, provider);
        }
      }catch(error){
        console.error(error);
        alert((error.code || "unknown") + "\n\n" + (error.message || "No message"));
      }
        };
      }

      if(modeNote){
        if(!authReady){
          modeNote.textContent = "Checking sign-in…";
        } else if(isOwner){
          modeNote.textContent = `Owner mode: ${currentUser?.email || ""}`;
        } else {
          modeNote.textContent = "View mode: shared read-only";
        }
      }
    }

    function openPost(num){
      currentPost = num;

      const post = posts[num];
      const grid = document.getElementById("postGrid");
      const card = document.getElementById("postCard");
      const topBack = document.getElementById("topBack");
      const ro = !isOwner ? "readonly" : "";

      grid.style.display = "none";
      card.style.display = "block";
      topBack.style.display = "flex";

      let scheduleHTML = "";
      post.schedule.forEach(function(item, index){
        scheduleHTML += `
          <div class="shift-row">
            <div class="time-cell">${escapeHtmlText(item[0])}</div>
            <div>
              <input
                class="assigned-input"
                type="text"
                id="assigned-${index}"
                value="${escapeHtmlAttr(item[1])}"
                ${ro}
              />
            </div>
          </div>
        `;
      });

      let countHTML = "";
      if(num === 9){
        countHTML = `
          <div class="count-box">
            <div class="label">Balcony Count Entry</div>
            <div>11:30 AM Count</div>
            <input type="text" id="count1Input" value="${escapeHtmlAttr(post.count1 || "")}" ${ro} />
            <div>1:50 PM Count</div>
            <input type="text" id="count2Input" value="${escapeHtmlAttr(post.count2 || "")}" ${ro} />
          </div>
        `;
      }

      const mapFile = imageMap[num];

      card.innerHTML = `
        <div class="card">
          <h2>${escapeHtmlText(post.title)}</h2>

          <div class="section-box details-box">
            <div class="label">Post Details</div>
            <textarea id="detailsInput" ${ro}>${escapeHtmlText(post.details || "")}</textarea>
          </div>

          <div class="section-box">
            <div class="label">Shift Times / Assigned</div>
            <div class="schedule-wrap">
              <div class="schedule-head">
                <div>Shift Time</div>
                <div>Assigned</div>
              </div>
              ${scheduleHTML}
            </div>
          </div>

          <div class="map">
            <div class="label">Post Location Reference</div>
            <div class="map-wrap">
              <img src="${mapFile}" alt="${escapeHtmlAttr(post.title)} map">
            </div>
          </div>

          <div class="notes">
            <strong>Captain Notes</strong>
            <textarea id="notesInput" ${ro}>${escapeHtmlText(post.notes || "")}</textarea>
          </div>

          ${countHTML}

          <div class="action-row">
            ${isOwner
              ? `<div class="save" onclick="savePost(${num})">Save Changes</div>`
              : `<div class="save disabled">View Only</div>`
            }
          </div>
        </div>
      `;
    }

    async function savePost(num){
      if(!isOwner) return;

      const post = posts[num];
      const detailsInput = document.getElementById("detailsInput");
      const notesInput = document.getElementById("notesInput");

      if(detailsInput){
        post.details = detailsInput.value;
      }

      if(notesInput){
        post.notes = notesInput.value;
      }

      post.schedule = post.schedule.map(function(item, index){
        const assignedInput = document.getElementById("assigned-" + index);
        return [item[0], assignedInput ? assignedInput.value : item[1]];
      });

      if(num === 9){
        const c1 = document.getElementById("count1Input");
        const c2 = document.getElementById("count2Input");
        post.count1 = c1 ? c1.value : "";
        post.count2 = c2 ? c2.value : "";
      }

      try{
        await saveBoard();
        alert("Saved");
      }catch(error){
        console.error(error);
        alert("Save failed");
      }
    }

    async function saveAlerts(){
      if(!isOwner) return;
      const editor = document.getElementById("alertEditor");
      if(!editor) return;

      alertsText = editor.value;

      try{
        await saveBoard();
        alert("Captain Alerts saved");
      }catch(error){
        console.error(error);
        alert("Save failed");
      }
    }

    async function resetAlerts(){
      if(!isOwner) return;
      alertsText = defaultAlerts.join("\n");
      const editor = document.getElementById("alertEditor");
      if(editor){
        editor.value = alertsText;
      }

      try{
        await saveBoard();
        alert("Captain Alerts reset");
      }catch(error){
        console.error(error);
        alert("Save failed");
      }
    }

    function toggleAlerts(){
      alertsOpen = !alertsOpen;
      renderAlerts();
    }

    function goBack(){
      currentPost = null;
      document.getElementById("postCard").style.display = "none";
      document.getElementById("postGrid").style.display = "grid";
      document.getElementById("topBack").style.display = "none";
    }

    async function shareBoard(){
      const cleanUrl = window.location.origin + window.location.pathname;

      try{
        if(navigator.share){
          await navigator.share({
            title: "Mililani Attendant Captain",
            text: "View the board",
            url: cleanUrl
          });
        }else if(navigator.clipboard){
          await navigator.clipboard.writeText(cleanUrl);
          alert("Link copied");
        }else{
          prompt("Copy this link:", cleanUrl);
        }
      }catch(error){
        console.error(error);
      }
    }

    function printBoard(){
      window.print();
    }

    function renderAll(){
      renderButtons();
      renderAlerts();
      updateOwnerUi();

      if(currentPost !== null){
        openPost(currentPost);
      }

      document.getElementById("loadingBar").style.display = boardLoaded ? "none" : "block";
    }

    try{
      await getRedirectResult(auth);
    }catch(error){
      console.error(error);
    }

    onAuthStateChanged(auth, async function(user){
      currentUser = user || null;
const signedInEmail = user && user.email ? user.email.toLowerCase().trim() : "";
const ownerEmail = OWNER_EMAIL.toLowerCase().trim();
isOwner = signedInEmail === ownerEmail;
      authReady = true;
      renderAll();

      if(isOwner){
        try{
          await ensureBoardExists();
        }catch(error){
          console.error(error);
        }
      }
    });

    onSnapshot(boardRef, function(docSnap){
      if(docSnap.exists()){
        applyBoardData(docSnap.data());
      }
      boardLoaded = true;
      renderAll();
    }, function(error){
      console.error(error);
      boardLoaded = true;
      renderAll();
      alert("Could not load live board data");
    });

    renderAll();

    window.savePost = savePost;
    window.saveAlerts = saveAlerts;
    window.resetAlerts = resetAlerts;
    window.toggleAlerts = toggleAlerts;
    window.goBack = goBack;
    window.shareBoard = shareBoard;
    window.printBoard = printBoard;
  </script>
</body>
</html>
