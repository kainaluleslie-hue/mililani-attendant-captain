<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mililani Attendant Captain</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f1115;color:#fff}
header{text-align:center;padding:20px;background:#151922}
h1{margin:0;font-size:28px}
.sub{color:#9aa3b2;margin-top:5px}
.container{max-width:900px;margin:auto;padding:20px}
.alert-shell{background:#181c26;border-radius:12px;margin-bottom:18px;overflow:hidden;border:1px solid #2c3245}
.alert-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:#1b2030;font-weight:bold}
.alert-body{padding:14px 16px;border-top:1px solid #2c3245;display:none}
.alert-body.open{display:block}
.alert-item{background:#232938;border-left:4px solid #2d7ff9;padding:10px 12px;border-radius:8px;margin-bottom:10px;line-height:1.45}
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.post-btn{background:#232938;padding:14px;border-radius:10px;text-align:center;cursor:pointer;font-weight:bold}
.post-btn:hover{background:#2a3145}
.card{background:#181c26;padding:18px;border-radius:12px;margin-top:20px}
.card h2{margin-top:0}
.section-box{background:#232938;padding:14px;border-radius:10px;margin-top:14px}
.shift-row{display:grid;grid-template-columns:1.2fr 1fr;gap:12px;padding:8px 0;border-bottom:1px solid #2c3245}
.shift-row:last-child{border-bottom:none}
.label{font-weight:bold;margin-bottom:8px}
.notes{margin-top:14px;background:#232938;padding:12px;border-radius:10px;line-height:1.5}
.notes textarea{width:100%;margin-top:10px;min-height:100px;border:none;border-radius:8px;padding:10px;font-family:Arial,sans-serif;font-size:14px;box-sizing:border-box}
.map{margin-top:14px}
.map img{width:100%;border-radius:10px;display:block}
.back-row{display:flex;gap:10px;margin-top:16px}
.back,.save{flex:1;padding:12px;text-align:center;border-radius:8px;cursor:pointer;font-weight:bold}
.back{background:#2d7ff9}
.save{background:#2a3145}
.count-box{margin-top:14px;background:#232938;padding:12px;border-radius:10px}
.count-box input{width:100%;margin-top:8px;margin-bottom:10px;padding:10px;border:none;border-radius:8px;box-sizing:border-box}
@media (max-width:700px){.post-grid{grid-template-columns:repeat(2,1fr)}.shift-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>Mililani Attendant Captain</h1>
<div class="sub">239 Palii Street, Mililani HI 96789</div>
</header>

<div class="container">
  <div class="top-bar">

<div class="back-top" onclick="goBack()" id="topBack">
← Back
</div>

<div class="alert-shell">
    <div class="alert-header" onclick="toggleAlerts()">
      <div>Captain Alerts</div>
      <div id="alertChevron">▾</div>
    </div>
    <div class="alert-body" id="alertBody">
      <div id="alertList"></div>
    </div>
  </div>

  <div id="postGrid" class="post-grid"></div>
  <div id="postCard" style="display:none"></div>
</div>

<script>
const STORAGE_KEY = "mililani-attendant-captain-v4";
const ALERTS_KEY = "mililani-attendant-alerts-open";

const posts = {
1:{title:"Post 1 – Lobby Entrance",map:"bkm1.jpg",schedule:[["7:45 AM – 9:20 AM","Team A"],["9:20 AM – 10:55 AM","Team B"],["10:55 AM – 12:10 PM","Team A"],["12:10 PM – 1:25 PM","Team B (Lunch)"],["1:25 PM – 2:40 PM","Team A"],["2:40 PM – 3:40 PM","Team B"],["3:40 PM – TBD","Team A"]],details:"Team A: Grant Manalili, Charlie Omo<br>Team B: Joel Kiliona, Esaias Parrish",notes:""},
2:{title:"Post 2 – Auditorium Entrance",map:"bkm2.jpg",schedule:[["7:45 AM – 9:20 AM","Erwin Pascua"],["9:20 AM – 10:55 AM","Mark Foster"],["10:55 AM – 12:10 PM","Erwin Pascua"],["12:10 PM – 1:25 PM","Mark Foster (Lunch)"],["1:25 PM – 2:40 PM","Erwin Pascua"],["2:40 PM – 3:40 PM","Mark Foster"],["3:40 PM – TBD","Erwin Pascua"]],details:"",notes:""},
3:{title:"Post 3 – Left Auditorium",map:"bkm2.jpg",schedule:[["7:45 AM – 9:20 AM","Kawika Delacruz"],["9:20 AM – 10:55 AM","Norman Ho'omanawanui"],["10:55 AM – 12:10 PM","Kawika Delacruz"],["12:10 PM – 1:25 PM","Norman Ho'omanawanui (Lunch)"],["1:25 PM – 2:40 PM","Kawika Delacruz"],["2:40 PM – 3:40 PM","Norman Ho'omanawanui"],["3:40 PM – TBD","Kawika Delacruz"]],details:"",notes:""},
4:{title:"Post 4 – Right Auditorium",map:"bkm2.jpg",schedule:[["7:45 AM – 9:20 AM","Hiland Itelmong"],["9:20 AM – 10:55 AM","Jourdan Manta"],["10:55 AM – 12:10 PM","Hiland Itelmong"],["12:10 PM – 1:25 PM","Jourdan Manta (Lunch)"],["1:25 PM – 2:40 PM","Hiland Itelmong"],["2:40 PM – 3:40 PM","Jourdan Manta"],["3:40 PM – TBD","Hiland Itelmong"]],details:"",notes:""},
5:{title:"Post 5 – KH A Hallway",map:"bkm3.jpg",schedule:[["7:45 AM – 9:20 AM","Logan Griffin"],["9:20 AM – 10:55 AM","Rodney Bristol"],["10:55 AM – 12:10 PM","Logan Griffin"],["12:10 PM – 1:25 PM","Rodney Bristol (Lunch)"],["1:25 PM – 2:40 PM","Logan Griffin"],["2:40 PM – 3:40 PM","Rodney Bristol"],["3:40 PM – TBD","Logan Griffin"]],details:"",notes:""},
6:{title:"Post 6 – Basement Stairs",map:"bkm4.jpg",schedule:[["6:45 AM – 7:45 AM","Kepa Apolo & Zechariah Tubon"],["7:45 AM – 9:20 AM","Al Tiu &"],["9:20 AM – 10:55 AM","Kepa Apolo & Zechariah Tubon"],["10:55 AM – 12:10 PM","Al Tiu &"],["12:10 PM – 1:25 PM","Kepa Apolo & Zechariah Tubon (Lunch)"],["1:25 PM – 2:40 PM","Al Tiu &"],["2:40 PM – 3:40 PM","Kepa Apolo & Zechariah Tubon"],["3:40 PM – TBD","Al Tiu &"]],details:"Evacuation note: No evacuation toward basement.",notes:""},
7:{title:"Post 7 – Top of Stairs",map:"bkm4.jpg",schedule:[["7:45 AM – 9:20 AM","David Yamashita"],["9:20 AM – 10:55 AM","Sean Yarbenet"],["10:55 AM – 12:10 PM","David Yamashita"],["12:10 PM – 1:25 PM","Sean Yarbenet (Lunch)"],["1:25 PM – 2:40 PM","David Yamashita"],["2:40 PM – 3:40 PM","Sean Yarbenet"],["3:40 PM – TBD","David Yamashita"]],details:"Tentative Backup:",notes:""},
8:{title:"Post 8 – Elevator Area (Balcony Level)",map:"bkm5.jpg",schedule:[["7:45 AM – 9:20 AM","Jordan Moananu"],["9:20 AM – 10:55 AM","Dennis Maeda"],["10:55 AM – 12:10 PM","Jordan Moananu"],["12:10 PM – 1:25 PM","Dennis Maeda (Lunch)"],["1:25 PM – 2:40 PM","Jordan Moananu"],["2:40 PM – 3:40 PM","Dennis Maeda"],["3:40 PM – TBD","Jordan Moananu"]],details:"",notes:""},
9:{title:"Post 9 – Balcony",map:"bkm5.jpg",schedule:[["7:45 AM – 9:20 AM","Nainoa Driver"],["9:20 AM – 10:55 AM","Joey Cariaga"],["10:55 AM – 12:10 PM","Nainoa Driver"],["12:10 PM – 1:25 PM","Joey Cariaga (Lunch)"],["1:25 PM – 2:40 PM","Nainoa Driver"],["2:40 PM – 3:40 PM","Joey Cariaga"],["3:40 PM – TBD","Nainoa Driver"]],details:"Balcony attendance count times:<br>Count #1 — 11:30 AM<br>Count #2 — 1:50 PM<br>Send totals to Captain",notes:"",count1:"",count2:""}
};

function loadSavedData(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try{
      const parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(function(key){
        if(posts[key]){
          posts[key].notes = parsed[key].notes || "";
          if(posts[key].count1 !== undefined){
            posts[key].count1 = parsed[key].count1 || "";
            posts[key].count2 = parsed[key].count2 || "";
          }
        }
      });
    }catch(e){}
  }
}

function saveData(){
  const payload = {};
  Object.keys(posts).forEach(function(key){
    payload[key] = {
      notes: posts[key].notes || "",
      count1: posts[key].count1 || "",
      count2: posts[key].count2 || ""
    };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
}

function renderButtons(){
  const grid = document.getElementById("postGrid");
  grid.innerHTML = "";
  for(let i=1;i<=9;i++){
    const btn = document.createElement("div");
    btn.className = "post-btn";
    btn.innerHTML = "Post " + i;
    btn.onclick = function(){ openPost(i); };
    grid.appendChild(btn);
  }
}

function renderAlerts(){
  const alerts = [
    "Post 6 needs second brother on Al Tiu shifts.",
    "Post 7 has tentative backup note.",
    "Balcony counts due at 11:30 AM and 1:50 PM.",
    "Tap a post to review schedule and location reference."
  ];
  document.getElementById("alertList").innerHTML = alerts.map(function(alert){
    return '<div class="alert-item">' + alert + '</div>';
  }).join("");
}

function toggleAlerts(){
  const body = document.getElementById("alertBody");
  const chev = document.getElementById("alertChevron");
  body.classList.toggle("open");
  const isOpen = body.classList.contains("open");
  chev.textContent = isOpen ? "▴" : "▾";
  localStorage.setItem(ALERTS_KEY, isOpen ? "open" : "closed");
}

function restoreAlertsState(){
  const state = localStorage.getItem(ALERTS_KEY);
  const body = document.getElementById("alertBody");
  const chev = document.getElementById("alertChevron");
  if(state === "open"){
    body.classList.add("open");
    chev.textContent = "▴";
  } else {
    body.classList.remove("open");
    chev.textContent = "▾";
  }
}

function openPost(num){
  const post = posts[num];
  const grid = document.getElementById("postGrid");
  const card = document.getElementById("postCard");
  grid.style.display = "none";
  card.style.display = "block";

  let scheduleHTML = "";
  post.schedule.forEach(function(item){
    scheduleHTML += `
      <div class="shift-row">
        <div>${item[0]}</div>
        <div>${item[1]}</div>
      </div>
    `;
  });

  let countHTML = "";
  if(num === 9){
    countHTML = `
      <div class="count-box">
        <div class="label">Balcony Count Entry</div>
        <div>11:30 AM Count</div>
        <input type="text" id="count1Input" value="${post.count1 || ""}">
        <div>1:50 PM Count</div>
        <input type="text" id="count2Input" value="${post.count2 || ""}">
      </div>
    `;
  }

  card.innerHTML = `
    <div class="card">
      <h2>${post.title}</h2>
      ${post.details ? `<div class="section-box">${post.details}</div>` : ""}
      <div class="section-box">
        <div class="label">Shift Times / Assigned</div>
        ${scheduleHTML}
      </div>
      <div class="map">
        <div class="label">Post Location Reference</div>
        <img src="${post.map}" alt="${post.title} map">
      </div>
      <div class="notes">
        <strong>Captain Notes</strong>
        <textarea id="notesInput">${post.notes || ""}</textarea>
      </div>
      ${countHTML}
      <div class="back-row">
        <div class="back" onclick="goBack()">Back to Posts</div>
        <div class="save" onclick="savePost(${num})">Save Notes</div>
      </div>
    </div>
  `;
}

function savePost(num){
  const post = posts[num];
  const notesInput = document.getElementById("notesInput");
  if(notesInput){ post.notes = notesInput.value; }
  if(num === 9){
    const c1 = document.getElementById("count1Input");
    const c2 = document.getElementById("count2Input");
    post.count1 = c1 ? c1.value : "";
    post.count2 = c2 ? c2.value : "";
  }
  saveData();
  alert("Saved");
}

function goBack(){
  document.getElementById("postCard").style.display = "none";
  document.getElementById("postGrid").style.display = "grid";
}

loadSavedData();
renderButtons();
renderAlerts();
restoreAlertsState();
</script>

</body>
</html>
