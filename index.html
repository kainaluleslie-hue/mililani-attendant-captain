<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mililani Attendant Captain</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#181c26;
      --panel-2:#232938;
      --panel-3:#1d2433;
      --header:#151922;
      --line:#2c3245;
      --text:#ffffff;
      --muted:#9aa3b2;
      --blue:#2d7ff9;
      --blue-hover:#3b8cff;
      --button:#2a3145;
      --button-hover:#35405c;
      --input-bg:#f4f6fa;
      --input-text:#111111;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      text-align:center;
      padding:20px;
      background:var(--header);
    }

    h1{
      margin:0;
      font-size:28px;
    }

    .sub{
      color:var(--muted);
      margin-top:5px;
    }

    .container{
      max-width:960px;
      margin:0 auto;
      padding:20px;
    }

    .utility-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .utility-btn{
      background:var(--blue);
      padding:12px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:140px;
      box-shadow:0 4px 10px rgba(0,0,0,.35);
      transition:background .2s;
      user-select:none;
    }

    .utility-btn:hover{
      background:var(--blue-hover);
    }

    .utility-btn.secondary{
      background:var(--button);
    }

    .utility-btn.secondary:hover{
      background:var(--button-hover);
    }

    .owner-status{
      color:var(--muted);
      font-size:13px;
      align-self:center;
      padding-left:4px;
    }

    .top-bar{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back-top{
      background:var(--blue);
      padding:16px 26px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      font-size:17px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      box-shadow:0 4px 10px rgba(0,0,0,.35);
      transition:background .2s;
      user-select:none;
    }

    .back-top:hover{
      background:var(--blue-hover);
    }

    .alert-shell{
      background:var(--panel);
      border-radius:12px;
      margin-bottom:18px;
      overflow:hidden;
      border:1px solid var(--line);
      flex:1;
      min-width:260px;
    }

    .alert-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      cursor:pointer;
      background:#1b2030;
      font-weight:bold;
    }

    .alert-body{
      padding:14px 16px;
      border-top:1px solid var(--line);
      display:none;
    }

    .alert-body.open{
      display:block;
    }

    .alert-editor{
      width:100%;
      min-height:140px;
      border:none;
      border-radius:10px;
      padding:12px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      resize:vertical;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .alert-help{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .alert-actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .alert-btn{
      background:var(--panel-2);
      border-radius:8px;
      padding:12px 14px;
      cursor:pointer;
      font-weight:bold;
      user-select:none;
    }

    .alert-btn.primary{
      background:var(--blue);
    }

    .alert-btn:hover{
      filter:brightness(1.08);
    }

    .post-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .post-btn{
      background:var(--panel-2);
      padding:16px 14px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
      font-weight:bold;
      font-size:18px;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
      user-select:none;
    }

    .post-btn:hover{
      background:#2f384f;
    }

    .card{
      background:var(--panel);
      padding:18px;
      border-radius:12px;
      margin-top:20px;
    }

    .card h2{
      margin-top:0;
      margin-bottom:14px;
      font-size:24px;
    }

    .section-box{
      background:var(--panel-2);
      padding:14px;
      border-radius:10px;
      margin-top:14px;
    }

    .label{
      font-weight:bold;
      margin-bottom:8px;
      font-size:15px;
    }

    .details-box textarea,
    .notes textarea{
      width:100%;
      border:none;
      border-radius:8px;
      padding:10px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      resize:vertical;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .details-box textarea{
      min-height:70px;
    }

    .schedule-wrap{
      margin-top:8px;
      border-radius:10px;
      overflow:hidden;
      border:1px solid var(--line);
    }

    .schedule-head{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:12px;
      background:#1c2231;
      padding:12px 14px;
      font-weight:bold;
      border-bottom:1px solid var(--line);
    }

    .shift-row{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:12px;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      align-items:center;
    }

    .shift-row:last-child{
      border-bottom:none;
    }

    .shift-row:nth-child(odd){
      background:var(--panel-2);
    }

    .shift-row:nth-child(even){
      background:var(--panel-3);
    }

    .time-cell{
      font-weight:bold;
      color:#f1f3f7;
    }

    .assigned-input{
      width:100%;
      border:none;
      border-radius:8px;
      padding:10px;
      font-family:Arial,sans-serif;
      font-size:15px;
      box-sizing:border-box;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .map{
      margin-top:14px;
    }

    .map-wrap{
      width:100%;
      border-radius:10px;
      overflow:hidden;
      background:#ffffff;
      border:1px solid rgba(0,0,0,.08);
    }

    .map-wrap img{
      width:100%;
      display:block;
      border-radius:10px;
    }

    .notes{
      margin-top:14px;
      background:var(--panel-2);
      padding:12px;
      border-radius:10px;
      line-height:1.5;
    }

    .notes textarea{
      margin-top:10px;
      min-height:110px;
    }

    .count-box{
      margin-top:14px;
      background:var(--panel-2);
      padding:12px;
      border-radius:10px;
    }

    .count-box input{
      width:100%;
      margin-top:8px;
      margin-bottom:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      box-sizing:border-box;
      font-size:14px;
      background:var(--input-bg);
      color:var(--input-text);
    }

    .action-row{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .save{
      flex:1;
      padding:14px 12px;
      text-align:center;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      background:var(--button);
      user-select:none;
    }

    .save:hover{
      background:var(--button-hover);
    }

    .save.disabled{
      opacity:.7;
      cursor:default;
    }

    @media (max-width:700px){
      .post-grid{
        grid-template-columns:repeat(2,1fr);
      }

      .schedule-head,
      .shift-row{
        grid-template-columns:1fr;
      }

      .back-top{
        min-width:100%;
      }

      .utility-btn{
        min-width:unset;
        flex:1 1 calc(50% - 10px);
      }

      .owner-status{
        width:100%;
      }
    }

    @media print{
      body{
        background:#fff !important;
        color:#000 !important;
      }

      .utility-bar,
      .top-bar,
      #topBack{
        display:none !important;
      }

      .container{
        max-width:100%;
        padding:0;
      }

      .card,
      .section-box,
      .notes,
      .count-box{
        background:#fff !important;
        color:#000 !important;
        border:1px solid #bbb !important;
      }

      .schedule-head{
        background:#eee !important;
        color:#000 !important;
      }

      .shift-row:nth-child(odd),
      .shift-row:nth-child(even){
        background:#fff !important;
        color:#000 !important;
      }

      .time-cell,
      .label,
      .card h2,
      strong{
        color:#000 !important;
      }

      textarea,
      input{
        background:#fff !important;
        color:#000 !important;
        border:1px solid #bbb !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mililani Attendant Captain</h1>

  <div class="container">
    <div class="utility-bar">

      <div class="owner-status" id="ownerStatus">View-only mode</div>
    </div>

    <div class="top-bar">
      <div class="back-top" onclick="goBack()" id="topBack" style="display:none;">

      <div class="alert-shell">

        </div>
        <div class="alert-body" id="alertBody">
          <textarea id="alertEditor" class="alert-editor"></textarea>
          <div class="alert-help">One alert per line. Edit anything you like, then save.</div>
          <div class="alert-actions">
            <div class="alert-btn primary" id="saveAlertsBtn" onclick="saveAlerts()">Save Alerts</div>
            <div class="alert-btn" id="resetAlertsBtn" onclick="resetAlerts()">Reset Default Alerts</div>
          </div>
        </div>

    const posts = JSON.parse(JSON.stringify(defaultPosts));

    function resetPostsToDefaults() {
      const fresh = JSON.parse(JSON.stringify(defaultPosts));
      Object.keys(fresh).forEach(function(key) {
        posts[key] = fresh[key];
      });
    }

    function serializePosts() {
      const out = {};
      Object.keys(posts).forEach(function(key) {
        out[key] = {
          details: posts[key].details || "",
          notes: posts[key].notes || "",
          schedule: posts[key].schedule || [],
          count1: posts[key].count1 || "",
          count2: posts[key].count2 || ""
        };
      });
      return out;
    }

    function getAlertsText() {
      return localStorage.getItem(ALERTS_TEXT_KEY) || defaultAlerts.join("\n");
    }

    function buildPayload() {
      const alertBody = document.getElementById("alertBody");
      const editor = document.getElementById("alertEditor");

      return {
        alertsText: editor ? editor.value : getAlertsText(),
        alertsOpen: alertBody ? alertBody.classList.contains("open") : false,
        posts: serializePosts(),
        updatedAt: Date.now()
      };
    }

    function applyPayload(data) {
      resetPostsToDefaults();

      if (data && data.posts) {
        Object.keys(data.posts).forEach(function(key) {
          if (posts[key]) {
            posts[key].details = data.posts[key].details !== undefined ? data.posts[key].details : posts[key].details;
            posts[key].notes = data.posts[key].notes || "";
            posts[key].schedule = data.posts[key].schedule || posts[key].schedule;
            if (posts[key].count1 !== undefined) {
              posts[key].count1 = data.posts[key].count1 || "";
              posts[key].count2 = data.posts[key].count2 || "";
            }
          }
        });
      }

      const alertsText = data && typeof data.alertsText === "string"
        ? data.alertsText
        : defaultAlerts.join("\n");

      const alertsOpen = !!(data && data.alertsOpen);

      localStorage.setItem(ALERTS_TEXT_KEY, alertsText);
      localStorage.setItem(ALERTS_KEY, alertsOpen ? "open" : "closed");
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serializePosts()));
    }

    function loadSavedData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        Object.keys(parsed).forEach(function(key) {
          if (posts[key]) {
            posts[key].details = parsed[key].details !== undefined ? parsed[key].details : posts[key].details;
            posts[key].notes = parsed[key].notes || "";
            posts[key].schedule = parsed[key].schedule || posts[key].schedule;
            if (posts[key].count1 !== undefined) {
              posts[key].count1 = parsed[key].count1 || "";
              posts[key].count2 = parsed[key].count2
