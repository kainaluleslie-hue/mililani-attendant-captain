<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mililani Attendant Captain</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f1115;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  background:#151922;
}

.container {
  padding:20px;
}

.post-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.post-btn {
  background:#232938;
  padding:16px;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.post-btn:hover {
  background:#2f384f;
}

.card {
  background:#181c26;
  padding:16px;
  border-radius:12px;
}

textarea, input {
  width:100%;
  margin-top:6px;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2d7ff9;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Mililani Attendant Captain</h1>
<div>239 Palii Street, Mililani HI 96789</div>
</header>

<div class="container">

<div id="postGrid" class="post-grid"></div>

<div id="postCard" style="display:none;"></div>

</div>

<script>

const posts = {
1:{title:"Post 1 – Lobby Entrance"},
2:{title:"Post 2 – Auditorium Entrance"},
3:{title:"Post 3 – Left Auditorium"},
4:{title:"Post 4 – Right Auditorium"},
5:{title:"Post 5 – KH A Hallway"},
6:{title:"Post 6 – Basement Stairs"},
7:{title:"Post 7 – Top of Stairs"},
8:{title:"Post 8 – Balcony Elevator"},
9:{title:"Post 9 – Balcony"}
};

function renderButtons(){
  const grid = document.getElementById("postGrid");
  grid.innerHTML = "";

  for(let i=1;i<=9;i++){
    const btn = document.createElement("div");
    btn.className = "post-btn";
    btn.textContent = "Post " + i;
    btn.onclick = function(){
      openPost(i);
    };
    grid.appendChild(btn);
  }
}

function openPost(num){
  const grid = document.getElementById("postGrid");
  const card = document.getElementById("postCard");

  grid.style.display="none";
  card.style.display="block";

  card.innerHTML = `
    <div class="card">
      <h2>${posts[num].title}</h2>

      <label>Details</label>
      <textarea id="details"></textarea>

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button onclick="goBack()">Back</button>
    </div>
  `;
}

function goBack(){
  document.getElementById("postCard").style.display="none";
  document.getElementById("postGrid").style.display="grid";
}

renderButtons();

</script>

</body>
</html>
