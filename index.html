<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mililani Attendant Captain</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:#fff;padding:16px}
h1{text-align:center;margin:0 0 6px}
.sub{text-align:center;color:#bbb;margin-bottom:16px}
.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:#222;color:#fff;border:1px solid #333;border-radius:10px;padding:10px 16px;cursor:pointer}
.tab.active{background:#2d7ff9}
.panel{background:#171717;border:1px solid #2f2f2f;border-radius:12px;padding:14px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.card{background:#202020;border:1px solid #333;border-radius:12px;padding:16px;cursor:pointer}
.hidden{display:none}
input,textarea{width:100%;box-sizing:border-box;padding:10px;border:none;border-radius:8px;background:#f2f2f2;color:#111;margin-top:6px}
textarea{min-height:100px}
button.small{background:#2d7ff9;color:#fff;border:none;border-radius:8px;padding:10px 14px;cursor:pointer}
.map{position:relative;border:1px solid #333;border-radius:12px;overflow:hidden;margin-bottom:16px}
.map img{width:100%;display:block;pointer-events:none}
.dot{position:absolute;width:10px;height:10px;background:red;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 1px #fff;cursor:pointer}
.row{display:flex;justify-content:space-between;gap:12px;padding:10px;border-bottom:1px solid #333}
.row:last-child{border-bottom:none}
</style>
</head>
<body>

<h1>Mililani Attendant Captain</h1>
<div class="sub">239 Palii Street, Mililani, HI 96789</div>

<div class="tabs">
  <button class="tab active" id="cardsBtn">Cards</button>
  <button class="tab" id="mapBtn">Map</button>
  <button class="tab" id="missionBtn">Mission Control</button>
</div>

<div class="panel" id="alertsBox">
  <b>Captain Alerts</b>
  <div id="alerts" style="margin-top:10px;color:#ffb0b0"></div>
</div>

<div id="cardsView">
  <div class="grid" id="cardsGrid"></div>
</div>

<div id="singleView" class="hidden">
  <div class="panel">
    <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <div>
        <div id="postTitle" style="font-size:24px;font-weight:bold"></div>
        <div id="postSub" style="color:#bbb;margin-top:6px"></div>
        <div id="postNote" style="margin-top:10px;background:#202020;border:1px solid #333;border-radius:10px;padding:10px"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-start">
        <button class="small" id="backBtn">Back</button>
        <button class="small" id="saveBtn">Save</button>
      </div>
    </div>

    <div style="margin-top:16px">
      <b>Assigned</b>
      <input id="assignedInput">
    </div>

    <div id="countBox" class="hidden" style="margin-top:16px;background:#202020;border:1px solid #333;border-radius:10px;padding:12px">
      <b>Balcony Counts</b>
      <div style="margin-top:8px">11:30 AM</div>
      <input id="count1Input">
      <div style="margin-top:8px">1:50 PM</div>
      <input id="count2Input">
    </div>

    <div style="margin-top:16px">
      <b>Captain Notes</b>
      <textarea id="notesInput"></textarea>
    </div>
  </div>
</div>

<div id="mapView" class="hidden">
  <div class="panel">
    <b>Ground Level</b>
    <div class="map" style="margin-top:10px">
      <img src="ground-map.png" alt="Ground Map">
      <div class="dot" style="left:23.6%;top:82.2%" data-post="1"></div>
      <div class="dot" style="left:49%;top:68.7%" data-post="2"></div>
      <div class="dot" style="left:33.7%;top:34%" data-post="3"></div>
      <div class="dot" style="left:64.8%;top:35.3%" data-post="4"></div>
      <div class="dot" style="left:85.2%;top:72%" data-post="5"></div>
      <div class="dot" style="left:58.8%;top:80.5%" data-post="6"></div>
      <div class="dot" style="left:58.4%;top:75.6%" data-post="7"></div>
    </div>

    <b>Balcony Level</b>
    <div class="map" style="margin-top:10px">
      <img src="balcony-map.png" alt="Balcony Map">
      <div class="dot" style="left:62.2%;top:75.2%" data-post="8"></div>
      <div class="dot" style="left:56%;top:59.3%" data-post="9"></div>
    </div>
  </div>
</div>

<div id="missionView" class="hidden">
  <div class="panel">
    <b>Posts</b>
    <div id="missionList" style="margin-top:10px"></div>
  </div>
</div>

<script>
const KEY = "mililani-simple-v1";

const defaults = [
  {id:1,title:"POST 1 — LOBBY ENTRANCE",sub:"2 Brothers Required",note:"Team A: Grant Manalili, Charlie Omo • Team B: Joel Kiliona, Isaias Parrish",assigned:"Team A",notes:"",count1:"",count2:""},
  {id:2,title:"POST 2 — AUDITORIUM ENTRANCE",sub:"",note:"",assigned:"Erwin Pascua",notes:"",count1:"",count2:""},
  {id:3,title:"POST 3 — LEFT AUDITORIUM",sub:"",note:"",assigned:"Kawika Delacruz",notes:"",count1:"",count2:""},
  {id:4,title:"POST 4 — RIGHT AUDITORIUM",sub:"",note:"",assigned:"Hiland Itelmong",notes:"",count1:"",count2:""},
  {id:5,title:"POST 5 — KH A HALLWAY",sub:"",note:"",assigned:"Logan Griffin",notes:"",count1:"",count2:""},
  {id:6,title:"POST 6 — BASEMENT STAIRS",sub:"2 Brothers Required",note:"No evacuation toward basement.",assigned:"Al Tiu &",notes:"",count1:"",count2:""},
  {id:7,title:"POST 7 — TOP OF STAIRS",sub:"",note:"Tentative Backup:",assigned:"David Yamashita",notes:"",count1:"",count2:""},
  {id:8,title:"POST 8 — ELEVATOR AREA",sub:"Balcony Level",note:"",assigned:"Jordan Moananu",notes:"",count1:"",count2:""},
  {id:9,title:"POST 9 — BALCONY",sub:"Attendance Counts",note:"Count #1 — 11:30 AM • Count #2 — 1:50 PM",assigned:"Nainoa Driver",notes:"",count1:"",count2:""}
];

let posts = loadPosts();
let currentPost = null;

function loadPosts(){
  try{
    const saved = localStorage.getItem(KEY);
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaults));
  }catch(e){
    return JSON.parse(JSON.stringify(defaults));
  }
}
function savePosts(){
  localStorage.setItem(KEY, JSON.stringify(posts));
}
function byId(id){
  return posts.find(function(p){ return p.id === id; });
}
function show(view){
  document.getElementById("cardsView").classList.add("hidden");
  document.getElementById("singleView").classList.add("hidden");
  document.getElementById("mapView").classList.add("hidden");
  document.getElementById("missionView").classList.add("hidden");
  document.getElementById(view).classList.remove("hidden");

  document.getElementById("cardsBtn").classList.remove("active");
  document.getElementById("mapBtn").classList.remove("active");
  document.getElementById("missionBtn").classList.remove("active");

  if(view==="cardsView" || view==="singleView") document.getElementById("cardsBtn").classList.add("active");
  if(view==="mapView") document.getElementById("mapBtn").classList.add("active");
  if(view==="missionView") document.getElementById("missionBtn").classList.add("active");
}
function buildAlerts(){
  const a = [];
  if(byId(6).assigned.trim().endsWith("&")) a.push("⚠ Post 6 needs second brother");
  a.push("⚠ Post 7 tentative backup");
  a.push("⏱ Balcony counts at 11:30 AM and 1:50 PM");
  document.getElementById("alerts").innerHTML = a.join("<br>");
}
function buildCards(){
  const grid = document.getElementById("cardsGrid");
  grid.innerHTML = "";
  posts.forEach(function(p){
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = "<div style='font-size:20px;font-weight:bold'>Post " + p.id + "</div><div style='margin-top:8px;color:#bbb'>" + p.title.replace(/^POST \\d+ — /,"") + "</div>";
    el.addEventListener("click", function(){ openPost(p.id); });
    grid.appendChild(el);
  });
}
function buildMission(){
  const box = document.getElementById("missionList");
  box.innerHTML = "";
  posts.forEach(function(p){
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = "<div><b>Post " + p.id + "</b></div><div>" + p.assigned + "</div>";
    row.addEventListener("click", function(){ openPost(p.id); });
    box.appendChild(row);
  });
}
function openPost(id){
  currentPost = id;
  const p = byId(id);
  document.getElementById("postTitle").textContent = p.title;
  document.getElementById("postSub").textContent = p.sub;
  document.getElementById("postNote").textContent = p.note;
  document.getElementById("assignedInput").value = p.assigned;
  document.getElementById("notesInput").value = p.notes;
  document.getElementById("count1Input").value = p.count1;
  document.getElementById("count2Input").value = p.count2;
  document.getElementById("countBox").classList.toggle("hidden", id !== 9);
  show("singleView");
}
function saveCurrent(){
  if(currentPost === null) return;
  const p = byId(currentPost);
  p.assigned = document.getElementById("assignedInput").value;
  p.notes = document.getElementById("notesInput").value;
  p.count1 = document.getElementById("count1Input").value;
  p.count2 = document.getElementById("count2Input").value;
  savePosts();
  buildAlerts();
  buildMission();
  alert("Saved");
}
document.getElementById("cardsBtn").addEventListener("click", function(){ show("cardsView"); });
document.getElementById("mapBtn").addEventListener("click", function(){ show("mapView"); });
document.getElementById("missionBtn").addEventListener("click", function(){ show("missionView"); });
document.getElementById("backBtn").addEventListener("click", function(){ show("cardsView"); });
document.getElementById("saveBtn").addEventListener("click", saveCurrent);

document.querySelectorAll(".dot").forEach(function(dot){
  dot.addEventListener("click", function(){
    openPost(parseInt(dot.getAttribute("data-post"),10));
  });
});

buildAlerts();
buildCards();
buildMission();
show("cardsView");
</script>

</body>
</html>
