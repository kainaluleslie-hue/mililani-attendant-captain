<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mililani Assembly Mission Control</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
padding:16px;
}

h1{
text-align:center;
margin:0 0 6px 0;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:18px;
}

.tab{
background:#222;
border:none;
padding:10px 16px;
color:white;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#2d7ff9;
}

.panel{
background:#161616;
border:1px solid #2a2a2a;
border-radius:12px;
padding:14px;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:14px;
}

.postRow{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #2b2b2b;
cursor:pointer;
}

.alert{
color:#ff5b5b;
margin:4px 0;
}

textarea,input{
width:100%;
padding:8px;
margin-top:6px;
border-radius:6px;
border:none;
background:#f2f2f2;
color:black;
}

button.save{
background:#2d7ff9;
border:none;
padding:8px 12px;
margin-top:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.map{
position:relative;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
}

.map img{
width:100%;
pointer-events:none;
}

.dot{
position:absolute;
width:8px;
height:8px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 0 1px white;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h1>Mililani Assembly Mission Control</h1>

<div class="tabs">
<button class="tab active" onclick="showTab('control')">Mission Control</button>
<button class="tab" onclick="showTab('map')">Map</button>
<button class="tab" onclick="showTab('shared')">Shared View</button>
</div>

<!-- Mission Control -->

<div id="control">

<div class="panel">
<b>Captain Alerts</b>

<div id="alerts"></div>

</div>

<div class="grid">

<div class="panel">
<b>Current Posts</b>

<div id="postList"></div>

</div>

<div class="panel">

<b>Edit Post</b>

<div id="editor">

Select a post.

</div>

</div>

<div class="panel">

<b>Balcony Counts</b>

11:30 Count
<input id="count1">

1:50 Count
<input id="count2">

<button class="save" onclick="saveCounts()">Save Counts</button>

</div>

</div>

</div>

<!-- MAP -->

<div id="map" class="hidden">

<div class="map">

<img src="ground-map.png">

<div class="dot" style="left:23.6%;top:82.2%" onclick="openPost(1)"></div>
<div class="dot" style="left:49%;top:68.7%" onclick="openPost(2)"></div>
<div class="dot" style="left:33.7%;top:34%" onclick="openPost(3)"></div>
<div class="dot" style="left:64.8%;top:35.3%" onclick="openPost(4)"></div>
<div class="dot" style="left:85.2%;top:72%" onclick="openPost(5)"></div>
<div class="dot" style="left:58.8%;top:80.5%" onclick="openPost(6)"></div>
<div class="dot" style="left:58.4%;top:75.6%" onclick="openPost(7)"></div>

</div>

<br>

<div class="map">

<img src="balcony-map.png">

<div class="dot" style="left:62%;top:75%" onclick="openPost(8)"></div>
<div class="dot" style="left:56%;top:59%" onclick="openPost(9)"></div>

</div>

</div>

<!-- SHARED VIEW -->

<div id="shared" class="hidden">

<div class="panel">

<b>Post Assignments</b>

<div id="sharedPosts"></div>

</div>

</div>

<script>

let posts=[
{ id:1,name:"Lobby Entrance",assigned:"Team A",alert:""},
{ id:2,name:"Auditorium Entrance",assigned:"Erwin Pascua",alert:""},
{ id:3,name:"Left Auditorium",assigned:"Kawika Delacruz",alert:""},
{ id:4,name:"Right Auditorium",assigned:"Hiland Itelmong",alert:""},
{ id:5,name:"KH A Hallway",assigned:"Logan Griffin",alert:""},
{ id:6,name:"Basement Stairs",assigned:"Kepa / Zechariah",alert:"Missing second brother"},
{ id:7,name:"Top of Stairs",assigned:"David Yamashita",alert:"Tentative backup"},
{ id:8,name:"Elevator Area",assigned:"Jordan Moananu",alert:""},
{ id:9,name:"Balcony Area",assigned:"Nainoa Driver",alert:"Balcony count"}
]

function showTab(t){

document.getElementById("control").classList.add("hidden")
document.getElementById("map").classList.add("hidden")
document.getElementById("shared").classList.add("hidden")

document.getElementById(t).classList.remove("hidden")

}

function render(){

let list=""
let alerts=""

posts.forEach(p=>{

list+=`<div class='postRow' onclick='openPost(${p.id})'>
<div>Post ${p.id}</div>
<div>${p.assigned}</div>
</div>`

if(p.alert!=""){
alerts+=`<div class='alert'>⚠ Post ${p.id} ${p.alert}</div>`
}

})

document.getElementById("postList").innerHTML=list
document.getElementById("alerts").innerHTML=alerts

let shared=""

posts.forEach(p=>{
shared+=`<div>Post ${p.id} — ${p.assigned}</div>`
})

document.getElementById("sharedPosts").innerHTML=shared

}

function openPost(id){

let p=posts.find(x=>x.id==id)

document.getElementById("editor").innerHTML=`

<b>Post ${p.id} — ${p.name}</b>

Assigned Brothers
<input id='editAssigned' value='${p.assigned}'>

Captain Notes
<textarea id='editNotes'></textarea>

<button class='save' onclick='savePost(${p.id})'>Save</button>

`

}

function savePost(id){

let p=posts.find(x=>x.id==id)

p.assigned=document.getElementById("editAssigned").value

render()

}

function saveCounts(){

alert("Counts saved")

}

render()

</script>

</body>
</html>
